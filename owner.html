<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - tools prompt</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f5f7fc; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; padding: 20px; border-radius: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background: #f87171; border: none; color: white; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-number { font-size: 2rem; font-weight: bold; color: #4f46e5; }
        .tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; background: white; border: 1px solid #e2e8f0; border-radius: 40px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }
        .tab-content { display: none; background: white; border-radius: 15px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; overflow-x: auto; display: block; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; font-weight: 600; }
        .status-badge { padding: 4px 8px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; display: inline-block; }
        .status-pending { background: #fef3c7; color: #b45309; }
        .status-paid { background: #d1fae5; color: #065f46; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .btn-sm { background: #4f46e5; color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }
        .btn-sm:hover { background: #6366f1; }
        @media (max-width: 768px) { table { display: block; overflow-x: auto; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-chart-line"></i> Owner Dashboard</h1>
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-title">Total Sales</div><div class="stat-number" id="totalSales">0</div></div>
        <div class="stat-card"><div class="stat-title">Total Earnings</div><div class="stat-number" id="totalEarnings">₹0</div></div>
        <div class="stat-card"><div class="stat-title">Sellers</div><div class="stat-number" id="totalSellers">0</div></div>
        <div class="stat-card"><div class="stat-title">Pending Payouts</div><div class="stat-number" id="pendingPayouts">0</div></div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="sellers">Sellers</button>
        <button class="tab-btn" data-tab="sales">Sales</button>
        <button class="tab-btn" data-tab="purchases">Purchases</button>
        <button class="tab-btn" data-tab="payouts">Payout Requests</button>
    </div>
    <div id="sellersTab" class="tab-content active"><div class="loading">Loading...</div></div>
    <div id="salesTab" class="tab-content"><div class="loading">Loading...</div></div>
    <div id="purchasesTab" class="tab-content"><div class="loading">Loading...</div></div>
    <div id="payoutsTab" class="tab-content"><div class="loading">Loading...</div></div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgc0xRtijpyPhOovfwg-MzyahsUFh-hiQ",
        authDomain: "toolsprompt-5b07e.firebaseapp.com",
        projectId: "toolsprompt-5b07e",
        storageBucket: "toolsprompt-5b07e.firebasestorage.app",
        messagingSenderId: "402263780942",
        appId: "1:402263780942:web:1013a347dbb72db6b31d1f",
        measurementId: "G-K4KXR4FZCP"
    };
    firebase.initializeApp(firebaseConfig);

    async function getCurrentUser() {
        return new Promise((resolve) => {
            const unsubscribe = firebase.auth().onAuthStateChanged(user => {
                unsubscribe();
                resolve(user);
            });
        });
    }

    async function fetchWithAuth(url, options = {}) {
        const user = await getCurrentUser();
        if (!user) throw new Error('Not authenticated');
        const idToken = await user.getIdToken();
        const res = await fetch(url, {
            ...options,
            headers: {
                ...options.headers,
                'Authorization': `Bearer ${idToken}`
            }
        });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    async function checkAdminAndLoad() {
        const user = await getCurrentUser();
        if (!user) {
            window.location.href = '/login.html?returnUrl=' + encodeURIComponent(window.location.pathname);
            return;
        }
        try {
            const data = await fetchWithAuth('/api/check-admin');
            if (!data.isAdmin) {
                window.location.href = '/dashboard.html';
                return;
            }
            // Admin is allowed, load data
            await loadData();
        } catch (error) {
            console.error('Admin check error:', error);
            window.location.href = '/dashboard.html';
        }
    }

    async function loadData() {
    try {
        const sellers = await fetchWithAuth('/api/owner/sellers');
        const sales = await fetchWithAuth('/api/owner/sales');
        const purchases = await fetchWithAuth('/api/owner/purchases');
        const pendingPayouts = await fetchWithAuth('/api/owner/pending-payouts');

        document.getElementById('totalSales').innerText = sales.sales.length;
        document.getElementById('totalEarnings').innerText = '₹' + sales.sales.reduce((s, sale) => s + (sale.sellerEarnings || 0), 0);
        document.getElementById('totalSellers').innerText = sellers.sellers.length;
        document.getElementById('pendingPayouts').innerText = pendingPayouts.payouts.length;

        renderSellers(sellers.sellers);
        renderSales(sales.sales);
        renderPurchases(purchases.purchases);
        renderPayouts(pendingPayouts.payouts);
    } catch (error) {
        console.error('Error loading data:', error);
        // Show detailed error to help debug
        alert('Failed to load data: ' + error.message);
        // Optionally, you can redirect to dashboard
        // window.location.href = '/dashboard.html';
    }
}
    function renderSellers(sellers) {
        const container = document.getElementById('sellersTab');
        if (!sellers.length) { container.innerHTML = '<p>No sellers found.</p>'; return; }
        let html = '<table><thead> <tr><th>Name</th><th>Email</th><th>UPI</th><th>Bank</th><th>Total Earnings</th><th>Paid Out</th><th>Available</th><th>Status</th></tr> </thead><tbody>';
        sellers.forEach(s => {
            html += `<tr>
                <td>${s.name}</td>
                <td>${s.email}</td>
                <td>${s.upiId || '—'}</td>
                <td>${s.bankName || '—'}</td>
                <td>₹${s.totalEarnings}</td>
                <td>₹${s.totalPaidOut}</td>
                <td>₹${s.availableBalance}</td>
                <td><span class="status-badge status-${s.status}">${s.status}</span></td>
            </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function renderSales(sales) {
        const container = document.getElementById('salesTab');
        if (!sales.length) { container.innerHTML = '<p>No sales yet.</p>'; return; }
        let html = '<table><thead> <tr><th>Date</th><th>Prompt</th><th>Buyer</th><th>Seller</th><th>Amount</th><th>Seller Earnings</th></tr> </thead><tbody>';
        sales.forEach(s => {
            html += `<tr>
                <td>${new Date(s.createdAt).toLocaleDateString()}</td>
                <td>${s.promptTitle}</td>
                <td>${s.buyerName}</td>
                <td>${s.sellerName}</td>
                <td>₹${s.amount}</td>
                <td>₹${s.sellerEarnings}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function renderPurchases(purchases) {
        const container = document.getElementById('purchasesTab');
        if (!purchases.length) { container.innerHTML = '<p>No purchases.</p>'; return; }
        let html = '表单<thead> <tr><th>Date</th><th>Prompt</th><th>Buyer</th><th>Seller</th><th>Amount</th></tr> </thead><tbody>';
        purchases.forEach(p => {
            html += `<tr>
                <td>${new Date(p.createdAt).toLocaleDateString()}</td>
                <td>${p.promptTitle}</td>
                <td>${p.buyerName}</td>
                <td>${p.sellerName}</td>
                <td>₹${p.amount}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function renderPayouts(payouts) {
        const container = document.getElementById('payoutsTab');
        if (!payouts.length) { container.innerHTML = '<p>No pending payouts.</p>'; return; }
        let html = '<table><thead><tr><th>Date</th><th>Seller ID</th><th>Amount</th><th>Action</th></tr></thead><tbody>';
        payouts.forEach(p => {
            html += `<tr>
                <td>${new Date(p.createdAt).toLocaleDateString()}</td>
                <td>${p.sellerId}</td>
                <td>₹${p.amount}</td>
                <td><button class="btn-sm" onclick="markPaid('${p.id}')">Mark Paid</button></td>
            </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    window.markPaid = async (payoutId) => {
        if (!confirm('Mark this payout as paid?')) return;
        try {
            await fetchWithAuth(`/api/owner/payout/${payoutId}`, { method: 'POST', body: JSON.stringify({}) });
            alert('Payout marked as paid');
            await loadData();
        } catch (error) {
            alert('Error: ' + error.message);
        }
    };

    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await firebase.auth().signOut();
        window.location.href = '/login.html';
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
        });
    });

    // Start the admin check and load
    checkAdminAndLoad();
</script>
</body>
</html>
